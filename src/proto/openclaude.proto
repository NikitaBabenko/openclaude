syntax = "proto3";

package openclaude.v1;

// Главный сервис
service AgentService {
  // Двунаправленный стрим: клиент шлет задачи и ответы на запросы агента,
  // сервер стримит токены, статусы тулзов и просит подтверждения.
  rpc Chat(stream ClientMessage) returns (stream ServerMessage);
}

// ---------------------------------------------------------
// СООБЩЕНИЯ ОТ КЛИЕНТА (Ввод)
// ---------------------------------------------------------
message ClientMessage {
  string session_id = 1;

  oneof payload {
    // 1. Инициализация запроса (первое сообщение в стриме)
    ChatRequest request = 2;
    
    // 2. Ответ пользователя на запрос агента (например, подтверждение команды)
    UserInput input = 3;
    
    // 3. Сигнал прерывания (если пользователь нажал "Stop generation")
    CancelSignal cancel = 4;
  }
}

message ChatRequest {
  string message = 1;
  string working_directory = 2; // Где агенту выполнять команды
  
  // Опциональные настройки сессии
  optional string provider = 3; // openai, anthropic, ollama
  optional string model = 4;
}

message UserInput {
  string reply = 1;       // Текст ответа (например, "y", "no", или уточнение)
  string prompt_id = 2;   // ID запроса, на который мы отвечаем
}

message CancelSignal {
  string reason = 1;
}

// ---------------------------------------------------------
// СООБЩЕНИЯ ОТ СЕРВЕРА (Вывод / События)
// ---------------------------------------------------------
message ServerMessage {
  // Использование oneof гарантирует, что придет только один тип события за раз
  oneof event {
    TextChunk text_chunk = 1;          // Кусочек текста от LLM
    ToolCallStart tool_start = 2;      // Агент начал использовать инструмент
    ToolCallResult tool_result = 3;    // Инструмент вернул результат
    ActionRequired action_required = 4;// Агенту нужно вмешательство человека
    FinalResponse done = 5;            // Генерация успешно завершена
    ErrorResponse error = 6;           // Произошла критическая ошибка
  }
}

// Кусочек стрима текста
message TextChunk {
  string text = 1;
}

// Агент решил использовать инструмент (bash, read_file и т.д.)
message ToolCallStart {
  string tool_name = 1;
  string arguments_json = 2; // Аргументы в JSON формате
}

// Результат работы инструмента
message ToolCallResult {
  string tool_name = 1;
  string output = 2;      // stdout/stderr или содержимое файла
  bool is_error = 3;      // Упала ли сама команда
}

// Агент приостановил работу и ждет решения пользователя
message ActionRequired {
  string prompt_id = 1;        // Клиент должен вернуть этот ID в UserInput
  string question = 2;         // Текст вопроса (например: "Execute 'rm -rf /'?")
  enum ActionType {
    CONFIRM_COMMAND = 0;       // Да/Нет
    REQUEST_INFORMATION = 1;   // Ввод текста
  }
  ActionType type = 3;
}

// Итоговая стата
message FinalResponse {
  string full_text = 1;     // Весь сгенерированный текст целиком
  int32 prompt_tokens = 2;
  int32 completion_tokens = 3;
}

message ErrorResponse {
  string message = 1;
  string code = 2;
}